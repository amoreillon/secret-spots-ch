    display: flex;
    align-items: center;

    flex-wrap: wrap;
  }

  #header p { font-size: 13px; color: #8b949e; flex: 1; }

  #layout { display: flex; height: calc(100vh - 57px); }

  #map { flex: 1; }

  #sidebar {
    width: 340px;
    background: #161b22;
    border-left: 1px solid #30363d;
    overflow-y: auto;

  #filter-info { font-size: 12px; color: #8b949e; margin-top: 6px; }

    cursor: pointer;
    transition: background 0.1s;
    display: flex;
    align-items: flex-start;

  .spot-item:hover { background: #21262d; }
  .spot-item.active { background: #1f3249; border-left: 3px solid #58a6ff; }

  .spot-rank {
    font-size: 11px;
    color: #8b949e;
    min-width: 20px;
    margin-top: 2px;
  }

  .spot-info { flex: 1; min-width: 0; }
  .spot-name { font-size: 14px; font-weight: 500; color: #e6edf3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .spot-meta { font-size: 12px; color: #8b949e; margin-top: 3px; }

  .score-badge {
    font-size: 12px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 12px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .score-hot { background: #1a3a5c; color: #58a6ff; }
  .score-warm { background: #1a3a2a; color: #3fb950; }
  .score-cool { background: #2d2a1a; color: #d29922; }

  /* Leaflet popup custom style */
  .custom-popup .leaflet-popup-content-wrapper {
    background: #161b22;
    color: #e6edf3;
    border: 1px solid #30363d;
    border-radius: 8px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);

  .custom-popup .leaflet-popup-content { margin: 12px 16px; min-width: 180px; }
  .popup-name { font-size: 14px; font-weight: 600; color: #58a6ff; margin-bottom: 8px; }
  .popup-row { font-size: 12px; color: #8b949e; margin-bottom: 3px; display: flex; justify-content: space-between; }
  .popup-val { color: #e6edf3; }
  .popup-score { font-size: 18px; font-weight: 700; color: #58a6ff; text-align: center; margin: 8px 0 4px; }
  .popup-score-label { font-size: 10px; color: #8b949e; text-align: center; margin-bottom: 4px; }

  /* Legend */
  #legend {
    position: absolute;
    bottom: 32px;
    left: 16px;
    z-index: 1000;
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 8px;

  .legend-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
  .legend-dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
</style>

function scoreColor(score) {
  if (score >= 35) return '#58a6ff';
  if (score >= 20) return '#3fb950';
  return '#d29922';
}

function scoreBadgeClass(score) {
  if (score >= 35) return 'score-hot';
  if (score >= 20) return 'score-warm';
  return 'score-cool';
}

function markerRadius(score) {
  return Math.max(6, Math.min(18, 4 + score / 4));
}

// Init map

  center: [46.8, 8.2],
  zoom: 7,
  zoomControl: true
});

  attribution: '&copy; <a href="https://carto.com/">CARTO</a> &copy; <a href="https://www.openstreetmap.org/copyright">OSM</a>',
  subdomains: 'abcd',
  maxZoom: 19
}).addTo(map);

// Build markers
const markers = [];
let activeIdx = null;

SPOTS.forEach((spot, i) => {
  const circle = L.circleMarker([spot.lat, spot.lon], {
    radius: markerRadius(spot.score),
    fillColor: scoreColor(spot.score),
    color: '#0d1117',
    weight: 1.5,
    fillOpacity: 0.85,
  });

  const popupHtml = `
    <div class="popup-name">${spot.name}</div>
    <div class="popup-score">${spot.score}</div>
    <div class="popup-score-label">suspicion score</div>
    <div class="popup-row"><span>Sessions</span><span class="popup-val">${spot.sessions}</span></div>
    <div class="popup-row"><span>Unique riders</span><span class="popup-val">${spot.riders}</span></div>
    <div class="popup-row"><span>Last active</span><span class="popup-val">${spot.last}</span></div>
    <div class="popup-row"><span>Diversity ratio</span><span class="popup-val">${(spot.riders/spot.sessions).toFixed(2)}</span></div>
  `;

  circle.bindPopup(popupHtml, { className: 'custom-popup', maxWidth: 240 });

  circle.on('click', () => {
    setActive(i);
    scrollToItem(i);
  });

  circle.addTo(map);
  markers.push(circle);
});

function setActive(idx) {
  if (activeIdx !== null) {
    document.querySelectorAll('.spot-item')[activeIdx]?.classList.remove('active');
  }
  activeIdx = idx;
  document.querySelectorAll('.spot-item')[idx]?.classList.add('active');
}

function scrollToItem(idx) {
  const items = document.querySelectorAll('.spot-item');
  items[idx]?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

// Sidebar list
const list = document.getElementById('spot-list');
const filterSlider = document.getElementById('score-filter');
const scoreValEl = document.getElementById('score-val');
const shownCountEl = document.getElementById('shown-count');

function renderList(minScore) {
  list.innerHTML = '';
  let shown = 0;
  SPOTS.forEach((spot, i) => {
    const visible = spot.score >= minScore;
    // Show/hide marker
    if (visible) {
      if (!map.hasLayer(markers[i])) markers[i].addTo(map);
    } else {
      if (map.hasLayer(markers[i])) map.removeLayer(markers[i]);
    }
    if (!visible) return;
    shown++;

    const div = document.createElement('div');
    div.className = 'spot-item';
    if (i === activeIdx) div.classList.add('active');
    div.innerHTML = `
      <div class="spot-rank">${shown}</div>
      <div class="spot-info">
        <div class="spot-name">${spot.name}</div>
        <div class="spot-meta">${spot.sessions} sessions · ${spot.riders} riders · last ${spot.last}</div>
      </div>
      <div class="score-badge ${scoreBadgeClass(spot.score)}">${spot.score}</div>
    `;
    div.addEventListener('click', () => {
      map.flyTo([spot.lat, spot.lon], 12, { duration: 0.8 });
      markers[i].openPopup();
      setActive(i);
    });
    list.appendChild(div);
  });
  shownCountEl.textContent = shown;
}
